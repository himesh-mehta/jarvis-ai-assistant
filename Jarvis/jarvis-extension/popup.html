<!DOCTYPE html>
<html>
<head>
    <title>JARVIS Agent</title>
    <style>
        body {
            width: 300px;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: white;
        }
        .status {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 10px;
        }
        .connected { background: #22c55e; box-shadow: 0 0 10px #22c55e; }
        .disconnected { background: #ef4444; box-shadow: 0 0 10px #ef4444; }
        
        input {
            width: 100%;
            padding: 8px;
            margin: 10px 0;
            background: #1e293b;
            border: 1px solid #334155;
            color: white;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #2563eb; }
        h2 { margin-top: 0; font-size: 1.2rem; background: linear-gradient(to right, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .label { font-size: 0.8rem; color: #94a3b8; }
    </style>
</head>
<body>
    <h2>JARVIS Extension</h2>
    <div class="status">
        <div id="statusDot" class="dot disconnected"></div>
        <span id="statusText">Disconnected</span>
    </div>
    
    <div class="label">WebSocket URL</div>
    <input type="text" id="wsUrl" placeholder="wss://your-bridge.railway.app">
    
    <div class="label">Secret Token</div>
    <input type="password" id="wsToken" placeholder="Enter token">
    
    <button id="saveBtn">Save & Connect</button>

    <script src="popup.js"></script>
</body>
</html>
