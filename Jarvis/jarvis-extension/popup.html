<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 320px;
            min-height: 200px;
            background: #020617;
            color: white;
            font-family: -apple-system, sans-serif;
            padding: 16px;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }
        .logo {
            font-size: 20px;
            font-weight: 900;
            background: linear-gradient(to right, #00D2FF, #7B2FFF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .status {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            font-size: 12px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 12px;
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .info {
            font-size: 11px;
            color: rgba(255,255,255,0.3);
            text-align: center;
            margin-top: 12px;
        }
        .task {
            padding: 8px 12px;
            background: rgba(0,210,255,0.05);
            border: 1px solid rgba(0,210,255,0.1);
            border-radius: 8px;
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 8px;
        }
        .task-title {
            color: #00D2FF;
            font-weight: bold;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>
    <div class="header">
        <span class="logo">JARVIS</span>
        <span style="font-size:11px;color:rgba(255,255,255,0.3)">Browser Agent</span>
    </div>

    <div class="status">
        <div class="dot" id="statusDot"></div>
        <span id="statusText">Connected to JARVIS</span>
    </div>

    <div id="currentTask" style="display:none" class="task">
        <div class="task-title">Current Task</div>
        <div id="taskText"></div>
    </div>

    <div class="info">
        JARVIS is controlling your browser.<br>
        Open JARVIS to give commands.
    </div>

    <script src="popup.js"></script>
</body>
</html>
